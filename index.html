<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token 聚合 - 极简版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: #e2e8f0; }
        .token-row:hover { background: #1e293b; transition: 0.2s; }
        .up { color: #4ade80; }
        .down { color: #f87171; }
        .loading { opacity: 0.5; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto mb-6">
        <h1 class="text-2xl md:text-3xl font-bold mb-2">🚀 Token 聚合平台</h1>
        <p class="text-slate-400 text-sm">数据来源：CoinGecko（免费 API）</p>
    </div>

    <div class="max-w-5xl mx-auto mb-4 flex flex-col sm:flex-row gap-3">
        <input type="text" id="searchInput" placeholder="搜索代币名称或符号..." 
            class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500">
        <select id="sortSelect" class="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:outline-none">
            <option value="market_cap_desc">按市值排序</option>
            <option value="price_desc">价格从高到低</option>
            <option value="price_asc">价格从低到高</option>
            <option value="change_desc">涨幅从高到低</option>
        </select>
        <button onclick="refreshData()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-sm font-medium transition">
            🔄 刷新
        </button>
    </div>

    <div class="max-w-5xl mx-auto bg-slate-800 rounded-xl overflow-hidden border border-slate-700">
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="bg-slate-900 text-slate-400 text-left">
                    <tr>
                        <th class="px-4 py-3 font-medium">#</th>
                        <th class="px-4 py-3 font-medium">代币</th>
                        <th class="px-4 py-3 font-medium text-right">价格 (USD)</th>
                        <th class="px-4 py-3 font-medium text-right">24h 涨跌</th>
                        <th class="px-4 py-3 font-medium text-right">市值</th>
                        <th class="px-4 py-3 font-medium text-right">24h 成交量</th>
                    </tr>
                </thead>
                <tbody id="tokenList">
                    <tr><td colspan="6" class="text-center py-12 text-slate-500">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="max-w-5xl mx-auto mt-6 text-center text-xs text-slate-500">
        <p>⚠️ 仅供学习参考，不构成投资建议 | 数据每 60 秒自动更新</p>
    </div>

    <script>
        const API_KEY = 'YOUR_API_KEY_HERE';
        const API_URL = 'https://api.coingecko.com/api/v3/coins/markets';
        const PARAMS = {
            vs_currency: 'usd',
            order: 'market_cap_desc',
            per_page: 50,
            page: 1,
            sparkline: false,
            price_change_percentage: '24h'
        };

        let allTokens = [];
        let retryCount = 0;

        async function fetchTokens() {
            const tbody = document.getElementById('tokenList');
            tbody.classList.add('loading');
            
            try {
                const query = new URLSearchParams(PARAMS).toString();
                let response;
                
                if (API_KEY !== 'YOUR_API_KEY_HERE') {
                    response = await fetch(`${API_URL}?${query}`, {
                        headers: { 'x-cg-pro-api-key': API_KEY }
                    });
                } else {
                    response = await fetch(`${API_URL}?${query}`);
                }
                
                if (!response.ok) {
                    if (response.status === 429) throw new Error('API 请求太频繁，请稍后再试');
                    throw new Error('API 请求失败');
                }
                
                allTokens = await response.json();
                renderTokens(allTokens);
                retryCount = 0;
                
            } catch (error) {
                if (retryCount < 2) {
                    retryCount++;
                    tbody.innerHTML = `<tr><td colspan="6" class="text-center py-12 text-yellow-400">正在重试 (${retryCount}/2)...<br><span class="text-slate-500 text-xs">CoinGecko 免费 API 有频率限制</span></td></tr>`;
                    setTimeout(fetchTokens, 3000);
                    return;
                }
                
                tbody.innerHTML = `
                    <tr><td colspan="6" class="text-center py-12 text-red-400">
                        加载失败：${error.message}<br>
                        <span class="text-slate-500 text-xs">建议：注册 CoinGecko 免费 API Key 以获得更稳定的服务</span><br>
                        <button onclick="refreshData()" class="mt-3 bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-sm">重试</button>
                    </td></tr>
                `;
            } finally {
                tbody.classList.remove('loading');
            }
        }

        function renderTokens(tokens) {
            const tbody = document.getElementById('tokenList');
            
            if (tokens.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-12 text-slate-500">无匹配结果</td></tr>';
                return;
            }

            tbody.innerHTML = tokens.map((token, index) => {
                const change = token.price_change_percentage_24h;
                const changeClass = change > 0 ? 'up' : (change < 0 ? 'down' : '');
                const changeSign = change > 0 ? '+' : '';
                
                const formatPrice = (price) => {
                    if (price >= 1) return price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                    return price.toFixed(6);
                };
                
                const formatNumber = (num) => {
                    if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
                    if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
                    if (num >= 1e3) return (num / 1e3).toFixed(2) + 'K';
                    return num.toFixed(2);
                };

                return `
                    <tr class="token-row border-t border-slate-700">
                        <td class="px-4 py-3 text-slate-500">${token.market_cap_rank || index + 1}</td>
                        <td class="px-4 py-3">
                            <div class="flex items-center gap-3">
                                <img src="${token.image}" alt="${token.name}" class="w-8 h-8 rounded-full" onerror="this.style.display='none'">
                                <div>
                                    <div class="font-medium">${token.name}</div>
                                    <div class="text-xs text-slate-500 uppercase">${token.symbol}</div>
                                </div>
                            </div>
                        </td>
                        <td class="px-4 py-3 text-right font-mono">$${formatPrice(token.current_price)}</td>
                        <td class="px-4 py-3 text-right font-mono ${changeClass}">
                            ${change !== null ? changeSign + change.toFixed(2) + '%' : '-'}
                        </td>
                        <td class="px-4 py-3 text-right text-slate-400">$${formatNumber(token.market_cap)}</td>
                        <td class="px-4 py-3 text-right text-slate-400">$${formatNumber(token.total_volume)}</td>
                    </tr>
                `;
            }).join('');
        }

        function handleSearch() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allTokens.filter(t => 
                t.name.toLowerCase().includes(keyword) || 
                t.symbol.toLowerCase().includes(keyword)
            );
            renderTokens(filtered);
        }

        function handleSort() {
            const sortType = document.getElementById('sortSelect').value;
            let sorted = [...allTokens];
            
            switch(sortType) {
                case 'price_desc': sorted.sort((a, b) => b.current_price - a.current_price); break;
                case 'price_asc': sorted.sort((a, b) => a.current_price - b.current_price); break;
                case 'change_desc': sorted.sort((a, b) => (b.price_change_percentage_24h || 0) - (a.price_change_percentage_24h || 0)); break;
                default: sorted.sort((a, b) => a.market_cap_rank - b.market_cap_rank);
            }
            
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            if (keyword) {
                sorted = sorted.filter(t => 
                    t.name.toLowerCase().includes(keyword) || 
                    t.symbol.toLowerCase().includes(keyword)
                );
            }
            renderTokens(sorted);
        }

        function refreshData() {
            retryCount = 0;
            fetchTokens();
        }

        document.getElementById('searchInput').addEventListener('input', handleSearch);
        document.getElementById('sortSelect').addEventListener('change', handleSort);

        fetchTokens();
        setInterval(fetchTokens, 60000);
    </script>
</body>
</html>
