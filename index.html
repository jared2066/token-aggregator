<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token 聚合 - 极简版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: #e2e8f0; }
        .token-row:hover { background: #1e293b; transition: 0.2s; }
        .up { color: #4ade80; }
        .down { color: #f87171; }
        .loading { opacity: 0.5; }
        .api-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; }
        .api-okx { background: #7c3aed; color: white; }
        .api-binance { background: #f59e0b; color: black; }
        .api-mock { background: #64748b; color: white; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto mb-6">
        <h1 class="text-2xl md:text-3xl font-bold mb-2">🚀 Token 聚合平台</h1>
        <p class="text-slate-400 text-sm flex items-center gap-2">
            数据来源：<span id="apiSource" class="api-tag api-okx">OKX</span>
            <span id="apiStatus" class="text-xs text-slate-500"></span>
        </p>
    </div>

    <div class="max-w-5xl mx-auto mb-4 flex flex-col sm:flex-row gap-3">
        <input type="text" id="searchInput" placeholder="搜索代币名称或符号..." 
            class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500">
        <select id="sortSelect" class="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:outline-none">
            <option value="market_cap_desc">按成交量排序</option>
            <option value="price_desc">价格从高到低</option>
            <option value="price_asc">价格从低到高</option>
            <option value="change_desc">涨幅从高到低</option>
        </select>
        <button onclick="refreshData()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-sm font-medium transition">
            🔄 刷新
        </button>
    </div>

    <div class="max-w-5xl mx-auto bg-slate-800 rounded-xl overflow-hidden border border-slate-700">
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="bg-slate-900 text-slate-400 text-left">
                    <tr>
                        <th class="px-4 py-3 font-medium">#</th>
                        <th class="px-4 py-3 font-medium">代币</th>
                        <th class="px-4 py-3 font-medium text-right">价格 (USD)</th>
                        <th class="px-4 py-3 font-medium text-right">24h 涨跌</th>
                        <th class="px-4 py-3 font-medium text-right">24h 成交量</th>
                    </tr>
                </thead>
                <tbody id="tokenList">
                    <tr><td colspan="5" class="text-center py-12 text-slate-500">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="max-w-5xl mx-auto mt-6 text-center text-xs text-slate-500">
        <p>⚠️ 仅供学习参考，不构成投资建议 | 数据每 60 秒自动更新</p>
    </div>

    <script>
        // ========== 配置区 ==========
        const OKX_API = 'https://www.okx.com/api/v5/market/tickers?instType=SPOT';
        const BINANCE_API = 'https://api.binance.com/api/v3/ticker/24hr';
        
        // 主流代币映射（instId -> 显示信息）
        const TOKEN_MAP = {
            'BTC-USDT': { symbol: 'BTC', name: 'Bitcoin', rank: 1 },
            'ETH-USDT': { symbol: 'ETH', name: 'Ethereum', rank: 2 },
            'BNB-USDT': { symbol: 'BNB', name: 'BNB', rank: 3 },
            'SOL-USDT': { symbol: 'SOL', name: 'Solana', rank: 4 },
            'XRP-USDT': { symbol: 'XRP', name: 'XRP', rank: 5 },
            'DOGE-USDT': { symbol: 'DOGE', name: 'Dogecoin', rank: 6 },
            'ADA-USDT': { symbol: 'ADA', name: 'Cardano', rank: 7 },
            'AVAX-USDT': { symbol: 'AVAX', name: 'Avalanche', rank: 8 },
            'DOT-USDT': { symbol: 'DOT', name: 'Polkadot', rank: 9 },
            'MATIC-USDT': { symbol: 'MATIC', name: 'Polygon', rank: 10 },
            'LINK-USDT': { symbol: 'LINK', name: 'Chainlink', rank: 11 },
            'LTC-USDT': { symbol: 'LTC', name: 'Litecoin', rank: 12 },
            'UNI-USDT': { symbol: 'UNI', name: 'Uniswap', rank: 13 },
            'ATOM-USDT': { symbol: 'ATOM', name: 'Cosmos', rank: 14 },
            'ETC-USDT': { symbol: 'ETC', name: 'Ethereum Classic', rank: 15 },
            'XLM-USDT': { symbol: 'XLM', name: 'Stellar', rank: 16 },
            'FIL-USDT': { symbol: 'FIL', name: 'Filecoin', rank: 17 },
            'ALGO-USDT': { symbol: 'ALGO', name: 'Algorand', rank: 18 },
            'VET-USDT': { symbol: 'VET', name: 'VeChain', rank: 19 },
            'TRX-USDT': { symbol: 'TRX', name: 'TRON', rank: 20 },
            'NEAR-USDT': { symbol: 'NEAR', name: 'NEAR Protocol', rank: 21 },
            'APT-USDT': { symbol: 'APT', name: 'Aptos', rank: 22 },
            'ICP-USDT': { symbol: 'ICP', name: 'Internet Computer', rank: 23 },
            'OP-USDT': { symbol: 'OP', name: 'Optimism', rank: 24 },
            'ARB-USDT': { symbol: 'ARB', name: 'Arbitrum', rank: 25 },
            'SUI-USDT': { symbol: 'SUI', name: 'Sui', rank: 26 },
            'SEI-USDT': { symbol: 'SEI', name: 'Sei', rank: 27 },
            'TON-USDT': { symbol: 'TON', name: 'Toncoin', rank: 28 },
            'BCH-USDT': { symbol: 'BCH', name: 'Bitcoin Cash', rank: 29 },
            'XMR-USDT': { symbol: 'XMR', name: 'Monero', rank: 30 },
            'HBAR-USDT': { symbol: 'HBAR', name: 'Hedera', rank: 31 },
            'KAS-USDT': { symbol: 'KAS', name: 'Kaspa', rank: 32 },
            'RNDR-USDT': { symbol: 'RNDR', name: 'Render', rank: 33 },
            'INJ-USDT': { symbol: 'INJ', name: 'Injective', rank: 34 },
            'IMX-USDT': { symbol: 'IMX', name: 'Immutable', rank: 35 },
            'GRT-USDT': { symbol: 'GRT', name: 'The Graph', rank: 36 },
            'STX-USDT': { symbol: 'STX', name: 'Stacks', rank: 37 },
            'THETA-USDT': { symbol: 'THETA', name: 'Theta Network', rank: 38 },
            'RUNE-USDT': { symbol: 'RUNE', name: 'THORChain', rank: 39 },
            'FLOW-USDT': { symbol: 'FLOW', name: 'Flow', rank: 40 },
            'MANA-USDT': { symbol: 'MANA', name: 'Decentraland', rank: 41 },
            'SAND-USDT': { symbol: 'SAND', name: 'The Sandbox', rank: 42 },
            'AXS-USDT': { symbol: 'AXS', name: 'Axie Infinity', rank: 43 },
            'CHZ-USDT': { symbol: 'CHZ', name: 'Chiliz', rank: 44 },
            'ENJ-USDT': { symbol: 'ENJ', name: 'Enjin Coin', rank: 45 },
            'BAT-USDT': { symbol: 'BAT', name: 'Basic Attention', rank: 46 },
            'ZIL-USDT': { symbol: 'ZIL', name: 'Zilliqa', rank: 47 },
            'ONT-USDT': { symbol: 'ONT', name: 'Ontology', rank: 48 },
            'IOTA-USDT': { symbol: 'IOTA', name: 'IOTA', rank: 49 },
            'XTZ-USDT': { symbol: 'XTZ', name: 'Tezos', rank: 50 }
        };

        let allTokens = [];
        let currentSource = 'okx';

        // ========== 格式化函数 ==========
        const formatPrice = (price) => {
            if (price >= 1) return price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            return price.toFixed(6);
        };
        
        const formatNumber = (num) => {
            if (num >= 1e12) return (num / 1e12).toFixed(2) + 'T';
            if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(2) + 'K';
            return num.toFixed(2);
        };

        // ========== OKX API ==========
        async function fetchOKX() {
            const response = await fetch(OKX_API);
            if (!response.ok) throw new Error('OKX API 失败');
            
            const data = await response.json();
            if (data.code !== '0') throw new Error('OKX 返回错误');
            
            return data.data
                .filter(item => TOKEN_MAP[item.instId])
                .map(item => ({
                    ...TOKEN_MAP[item.instId],
                    price: parseFloat(item.last),
                    change: parseFloat(item.open24h) ? ((parseFloat(item.last) - parseFloat(item.open24h)) / parseFloat(item.open24h) * 100) : 0,
                    volume: parseFloat(item.volCcy24h) * parseFloat(item.last)
                }))
                .sort((a, b) => a.rank - b.rank);
        }

        // ========== Binance API（备用） ==========
        async function fetchBinance() {
            const response = await fetch(BINANCE_API);
            if (!response.ok) throw new Error('Binance API 失败');
            
            const data = await response.json();
            
            return data
                .filter(item => {
                    const base = item.symbol.replace('USDT', '');
                    return Object.values(TOKEN_MAP).some(t => t.symbol === base);
                })
                .map(item => {
                    const base = item.symbol.replace('USDT', '');
                    const mapEntry = Object.entries(TOKEN_MAP).find(([_, v]) => v.symbol === base);
                    return {
                        ...mapEntry[1],
                        price: parseFloat(item.lastPrice),
                        change: parseFloat(item.priceChangePercent),
                        volume: parseFloat(item.volume) * parseFloat(item.lastPrice)
                    };
                })
                .sort((a, b) => a.rank - b.rank);
        }

        // ========== Mock 数据（最后备用） ==========
        function getMockData() {
            return Object.values(TOKEN_MAP).map(t => ({
                ...t,
                price: Math.random() * 1000 + 0.1,
                change: (Math.random() - 0.5) * 20,
                volume: Math.random() * 1000000000
            })).sort((a, b) => a.rank - b.rank);
        }

        // ========== 主加载函数 ==========
        async function fetchTokens() {
            const tbody = document.getElementById('tokenList');
            const sourceTag = document.getElementById('apiSource');
            const statusTag = document.getElementById('apiStatus');
            
            tbody.classList.add('loading');
            
            try {
                // 先尝试 OKX
                statusTag.textContent = '正在连接 OKX...';
                allTokens = await fetchOKX();
                currentSource = 'okx';
                sourceTag.className = 'api-tag api-okx';
                sourceTag.textContent = 'OKX';
                
            } catch (okxError) {
                console.log('OKX 失败，尝试 Binance:', okxError);
                
                try {
                    // 再尝试 Binance
                    statusTag.textContent = 'OKX 失败，正在连接 Binance...';
                    allTokens = await fetchBinance();
                    currentSource = 'binance';
                    sourceTag.className = 'api-tag api-binance';
                    sourceTag.textContent = 'Binance';
                    
                } catch (binanceError) {
                    console.log('Binance 也失败，使用 Mock 数据:', binanceError);
                    
                    // 最后用 Mock
                    statusTag.textContent = 'API 受限，使用演示数据';
                    allTokens = getMockData();
                    currentSource = 'mock';
                    sourceTag.className = 'api-tag api-mock';
                    sourceTag.textContent = '演示数据';
                }
            }
            
            renderTokens(allTokens);
            tbody.classList.remove('loading');
            statusTag.textContent = currentSource === 'mock' ? '（API 受限时的备用方案）' : `（${new Date().toLocaleTimeString()} 更新）`;
        }

        // ========== 渲染函数 ==========
        function renderTokens(tokens) {
            const tbody = document.getElementById('tokenList');
            
            if (tokens.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-12 text-slate-500">无匹配结果</td></tr>';
                return;
            }

            tbody.innerHTML = tokens.map((token, index) => {
                const change = token.change;
                const changeClass = change > 0 ? 'up' : (change < 0 ? 'down' : '');
                const changeSign = change > 0 ? '+' : '';

                return `
                    <tr class="token-row border-t border-slate-700">
                        <td class="px-4 py-3 text-slate-500">${index + 1}</td>
                        <td class="px-4 py-3">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-xs font-bold text-white">
                                    ${token.symbol[0]}
                                </div>
                                <div>
                                    <div class="font-medium">${token.name}</div>
                                    <div class="text-xs text-slate-500 uppercase">${token.symbol}</div>
                                </div>
                            </div>
                        </td>
                        <td class="px-4 py-3 text-right font-mono">$${formatPrice(token.price)}</td>
                        <td class="px-4 py-3 text-right font-mono ${changeClass}">
                            ${changeSign}${change.toFixed(2)}%
                        </td>
                        <td class="px-4 py-3 text-right text-slate-400">$${formatNumber(token.volume)}</td>
                    </tr>
                `;
            }).join('');
        }

        // ========== 搜索和排序 ==========
        function handleSearch() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allTokens.filter(t => 
                t.name.toLowerCase().includes(keyword) || 
                t.symbol.toLowerCase().includes(keyword)
            );
            renderTokens(filtered);
        }

        function handleSort() {
            const sortType = document.getElementById('sortSelect').value;
            let sorted = [...allTokens];
            
            switch(sortType) {
                case 'price_desc': sorted.sort((a, b) => b.price - a.price); break;
                case 'price_asc': sorted.sort((a, b) => a.price - b.price); break;
                case 'change_desc': sorted.sort((a, b) => b.change - a.change); break;
                default: sorted.sort((a, b) => b.volume - a.volume);
            }
            
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            if (keyword) {
                sorted = sorted.filter(t => 
                    t.name.toLowerCase().includes(keyword) || 
                    t.symbol.toLowerCase().includes(keyword)
                );
            }
            renderTokens(sorted);
        }

        function refreshData() {
            fetchTokens();
        }

        // ========== 初始化 ==========
        document.getElementById('searchInput').addEventListener('input', handleSearch);
        document.getElementById('sortSelect').addEventListener('change', handleSort);

        fetchTokens();
        setInterval(fetchTokens, 60000);
    </script>
</body>
</html>
