<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token 聚合 - 极简版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: #e2e8f0; }
        .token-row:hover { background: #1e293b; transition: 0.2s; }
        .up { color: #4ade80; }
        .down { color: #f87171; }
        .loading { opacity: 0.5; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto mb-6">
        <h1 class="text-2xl md:text-3xl font-bold mb-2">🚀 Token 聚合平台</h1>
        <p class="text-slate-400 text-sm">数据来源：Binance（公开 API，国内可访问）</p>
    </div>

    <div class="max-w-5xl mx-auto mb-4 flex flex-col sm:flex-row gap-3">
        <input type="text" id="searchInput" placeholder="搜索代币名称或符号..." 
            class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500">
        <select id="sortSelect" class="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:outline-none">
            <option value="market_cap_desc">按市值排序</option>
            <option value="price_desc">价格从高到低</option>
            <option value="price_asc">价格从低到高</option>
            <option value="change_desc">涨幅从高到低</option>
        </select>
        <button onclick="refreshData()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-sm font-medium transition">
            🔄 刷新
        </button>
    </div>

    <div class="max-w-5xl mx-auto bg-slate-800 rounded-xl overflow-hidden border border-slate-700">
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="bg-slate-900 text-slate-400 text-left">
                    <tr>
                        <th class="px-4 py-3 font-medium">#</th>
                        <th class="px-4 py-3 font-medium">代币</th>
                        <th class="px-4 py-3 font-medium text-right">价格 (USD)</th>
                        <th class="px-4 py-3 font-medium text-right">24h 涨跌</th>
                        <th class="px-4 py-3 font-medium text-right">24h 成交量</th>
                    </tr>
                </thead>
                <tbody id="tokenList">
                    <tr><td colspan="5" class="text-center py-12 text-slate-500">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="max-w-5xl mx-auto mt-6 text-center text-xs text-slate-500">
        <p>⚠️ 仅供学习参考，不构成投资建议 | 数据每 60 秒自动更新</p>
    </div>

    <script>
        // ========== 配置区 ==========
        const API_URL = 'https://api.binance.com/api/v3/ticker/24hr';
        const PRICE_URL = 'https://api.binance.com/api/v3/ticker/price';
        
        // 主流代币列表（USDT 交易对）
        const TOP_SYMBOLS = [
            'BTCUSDT', 'ETHUSDT', 'BNBUSDT', 'SOLUSDT', 'XRPUSDT',
            'DOGEUSDT', 'ADAUSDT', 'AVAXUSDT', 'DOTUSDT', 'MATICUSDT',
            'LINKUSDT', 'LTCUSDT', 'UNIUSDT', 'ATOMUSDT', 'ETCUSDT',
            'XLMUSDT', 'FILUSDT', 'ALGOUSDT', 'VETUSDT', 'TRXUSDT',
            'NEARUSDT', 'APTUSDT', 'ICPUSDT', 'OPUSDT', 'ARBUSDT',
            'SUIUSDT', 'SEIUSDT', 'TONUSDT', 'BCHUSDT', 'XMRUSDT',
            'HBARUSDT', 'KASUSDT', 'RNDRUSDT', 'INJUSDT', 'IMXUSDT',
            'GRTUSDT', 'STXUSDT', 'THETAUSDT', 'RUNEUSDT', 'FLOWUSDT',
            'MANAUSDT', 'SANDUSDT', 'AXSUSDT', 'CHZUSDT', 'ENJUSDT',
            'BATUSDT', 'ZILUSDT', 'ONTUSDT', 'IOTAUSDT', 'XTZUSDT'
        ];

        let allTokens = [];
        let retryCount = 0;

        // ========== 核心函数 ==========
        async function fetchTokens() {
            const tbody = document.getElementById('tokenList');
            tbody.classList.add('loading');
            
            try {
                // 获取 24h 数据
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('API 请求失败');
                
                const data = await response.json();
                
                // 过滤出主流代币
                allTokens = data
                    .filter(item => TOP_SYMBOLS.includes(item.symbol))
                    .map((item, index) => ({
                        rank: index + 1,
                        symbol: item.symbol.replace('USDT', ''),
                        name: getTokenName(item.symbol),
                        price: parseFloat(item.lastPrice),
                        change: parseFloat(item.priceChangePercent),
                        volume: parseFloat(item.volume) * parseFloat(item.lastPrice),
                        quoteVolume: parseFloat(item.quoteVolume)
                    }))
                    .sort((a, b) => b.volume - a.volume); // 按成交量排序
                
                renderTokens(allTokens);
                retryCount = 0;
                
            } catch (error) {
                if (retryCount < 2) {
                    retryCount++;
                    tbody.innerHTML = `<tr><td colspan="5" class="text-center py-12 text-yellow-400">正在重试 (${retryCount}/2)...<br><span class="text-slate-500 text-xs">网络连接中</span></td></tr>`;
                    setTimeout(fetchTokens, 3000);
                    return;
                }
                
                tbody.innerHTML = `
                    <tr><td colspan="5" class="text-center py-12 text-red-400">
                        加载失败：${error.message}<br>
                        <span class="text-slate-500 text-xs">请检查网络连接，或稍后再试</span><br>
                        <button onclick="refreshData()" class="mt-3 bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-sm">重试</button>
                    </td></tr>
                `;
            } finally {
                tbody.classList.remove('loading');
            }
        }

        function getTokenName(symbol) {
            const names = {
                'BTC': 'Bitcoin', 'ETH': 'Ethereum', 'BNB': 'BNB', 'SOL': 'Solana',
                'XRP': 'XRP', 'DOGE': 'Dogecoin', 'ADA': 'Cardano', 'AVAX': 'Avalanche',
                'DOT': 'Polkadot', 'MATIC': 'Polygon', 'LINK': 'Chainlink', 'LTC': 'Litecoin',
                'UNI': 'Uniswap', 'ATOM': 'Cosmos', 'ETC': 'Ethereum Classic', 'XLM': 'Stellar',
                'FIL': 'Filecoin', 'ALGO': 'Algorand', 'VET': 'VeChain', 'TRX': 'TRON',
                'NEAR': 'NEAR Protocol', 'APT': 'Aptos', 'ICP': 'Internet Computer', 'OP': 'Optimism',
                'ARB': 'Arbitrum', 'SUI': 'Sui', 'SEI': 'Sei', 'TON': 'Toncoin',
                'BCH': 'Bitcoin Cash', 'XMR': 'Monero', 'HBAR': 'Hedera', 'KAS': 'Kaspa',
                'RNDR': 'Render', 'INJ': 'Injective', 'IMX': 'Immutable', 'GRT': 'The Graph',
                'STX': 'Stacks', 'THETA': 'Theta Network', 'RUNE': 'THORChain', 'FLOW': 'Flow',
                'MANA': 'Decentraland', 'SAND': 'The Sandbox', 'AXS': 'Axie Infinity', 'CHZ': 'Chiliz',
                'ENJ': 'Enjin Coin', 'BAT': 'Basic Attention', 'ZIL': 'Zilliqa', 'ONT': 'Ontology',
                'IOTA': 'IOTA', 'XTZ': 'Tezos'
            };
            return names[symbol.replace('USDT', '')] || symbol.replace('USDT', '');
        }

        function renderTokens(tokens) {
            const tbody = document.getElementById('tokenList');
            
            if (tokens.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-12 text-slate-500">无匹配结果</td></tr>';
                return;
            }

            tbody.innerHTML = tokens.map((token, index) => {
                const change = token.change;
                const changeClass = change > 0 ? 'up' : (change < 0 ? 'down' : '');
                const changeSign = change > 0 ? '+' : '';
                
                const formatPrice = (price) => {
                    if (price >= 1) return price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                    return price.toFixed(6);
                };
                
                const formatNumber = (num) => {
                    if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
                    if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
                    if (num >= 1e3) return (num / 1e3).toFixed(2) + 'K';
                    return num.toFixed(2);
                };

                return `
                    <tr class="token-row border-t border-slate-700">
                        <td class="px-4 py-3 text-slate-500">${index + 1}</td>
                        <td class="px-4 py-3">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center text-xs font-bold">
                                    ${token.symbol[0]}
                                </div>
                                <div>
                                    <div class="font-medium">${token.name}</div>
                                    <div class="text-xs text-slate-500 uppercase">${token.symbol}</div>
                                </div>
                            </div>
                        </td>
                        <td class="px-4 py-3 text-right font-mono">$${formatPrice(token.price)}</td>
                        <td class="px-4 py-3 text-right font-mono ${changeClass}">
                            ${changeSign + change.toFixed(2)}%
                        </td>
                        <td class="px-4 py-3 text-right text-slate-400">$${formatNumber(token.volume)}</td>
                    </tr>
